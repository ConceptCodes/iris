global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'iris-server'
    metrics_path: /metrics
    http_headers:
      X-Admin-Key:
        values: ['change-me']
    static_configs:
      - targets: ['server:8080']
        labels:
          service: 'iris-server'
          env: 'dev'
