version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris -d iris"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Qdrant vector database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "127.0.0.1:6333:6333"   # REST API  (optional, for the Qdrant Web UI)
      - "127.0.0.1:6334:6334"   # gRPC API  (used by the Go service)
    volumes:
      - qdrant_data:/qdrant/storage

  # ── CLIP embedding sidecar ─────────────────────────────────────────────────
  clip:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: clip
    env_file:
      - .env.docker
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Jaeger distributed tracing ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.53
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:4317:4317"    # OTLP gRPC receiver

  # ── Go API server ──────────────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: server
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    volumes:
      - ../data/assets:/data/assets
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      clip:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: worker
    command: ["-seed-url-file", "/examples/demo-urls.txt"]
    env_file:
      - .env.docker
    volumes:
      - ../data/assets:/data/assets
      - ../examples:/examples
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      clip:
        condition: service_healthy

  # ── Prometheus metrics collector ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      - server

  # ── Grafana visualization ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  postgres_data:
  prometheus_data:
  grafana_data:
