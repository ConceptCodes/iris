version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris -d iris"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Qdrant vector database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"   # REST API  (optional, for the Qdrant Web UI)
      - "6334:6334"   # gRPC API  (used by the Go service)
    volumes:
      - qdrant_data:/qdrant/storage

  # ── CLIP embedding sidecar ─────────────────────────────────────────────────
  clip:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: clip
    ports:
      - "8001:8001"
    env_file:
      - .env.docker
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Go API server ──────────────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: server
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    volumes:
      - ../data/assets:/data/assets
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      clip:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: worker
    command: ["-seed-url-file", "/examples/demo-urls.txt"]
    env_file:
      - .env.docker
    volumes:
      - ../data/assets:/data/assets
      - ../examples:/examples
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      clip:
        condition: service_healthy

volumes:
  qdrant_data:
  postgres_data:
