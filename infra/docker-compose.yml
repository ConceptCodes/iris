version: "3.9"

services:
  # ── Qdrant vector database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"   # REST API  (optional, for the Qdrant Web UI)
      - "6334:6334"   # gRPC API  (used by the Go service)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── CLIP embedding sidecar ─────────────────────────────────────────────────
  clip:
    build:
      context: ./clip_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MODEL=ViT-B-32       # swap to ViT-L-14 for higher quality
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Go API server ──────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "8080:8080"
    environment:
      - CLIP_ADDR=http://clip:8001
      - QDRANT_ADDR=qdrant:6334
      - CLIP_DIM=512
      - HTTP_ADDR=:8080
    depends_on:
      qdrant:
        condition: service_healthy
      clip:
        condition: service_healthy

volumes:
  qdrant_data: