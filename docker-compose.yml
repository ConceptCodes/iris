version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=iris
      - POSTGRES_PASSWORD=iris
      - POSTGRES_DB=iris
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris -d iris"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Qdrant vector database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"   # REST API  (optional, for the Qdrant Web UI)
      - "6334:6334"   # gRPC API  (used by the Go service)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── CLIP embedding sidecar ─────────────────────────────────────────────────
  clip:
    build:
      context: ./clip_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MODEL=ViT-B-32       # swap to ViT-L-14 for higher quality
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Go API server ──────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "8080:8080"
    environment:
      - CLIP_ADDR=http://clip:8001
      - QDRANT_ADDR=qdrant:6334
      - CLIP_DIM=512
      - HTTP_ADDR=:8080
      - ASSET_DIR=/data/assets
      - JOB_BACKEND=postgres
      - JOB_STORE_DSN=postgres://iris:iris@postgres:5432/iris?sslmode=disable
      - ADMIN_API_KEY=dev-admin-key
    volumes:
      - ./data/assets:/data/assets
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      clip:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    command: ["-seed-url-file", "/examples/demo-urls.txt"]
    environment:
      - CLIP_ADDR=http://clip:8001
      - QDRANT_ADDR=qdrant:6334
      - CLIP_DIM=512
      - ASSET_DIR=/data/assets
      - WORKER_MODE=indexer
      - JOB_BACKEND=postgres
      - JOB_STORE_DSN=postgres://iris:iris@postgres:5432/iris?sslmode=disable
      - JOB_POLL_INTERVAL=1s
      - LEASE_DURATION=30s
    volumes:
      - ./data/assets:/data/assets
      - ./examples:/examples
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      clip:
        condition: service_healthy

volumes:
  qdrant_data:
  postgres_data:
